<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>That Can't Be Right</title>
</head>
<body>
<main>

    <div id="intro">
        <h1>That Can't Be Right!</h1>
        <br/><br/><br/>
        <p>The rule is simple... Wrong Answers Only.</p>  
        <br/>
        <button id="start-btn">BEGIN QUIZ</button>
    </div>

    <div id="quiz" class="hidden">
        <h3 class="warning">Choose the wrong answer!</h3>
        <h2 id="question"></h2>
        <div id="options"></div>
        <h3 id="feedback"></h3>
        <button id="next-btn" class="hidden">Next</button>
    </div>

    <div id="results" class="hidden">
        <h2>You scored <span id="score"></span>...somehow</h2>
        <p id="comment"></p>
    </div>

</main>
<footer>
    <p>&#169; Tobi Olu 2026</p>
</footer>

<script src="src/index.js"></script>

</body>
</html>
