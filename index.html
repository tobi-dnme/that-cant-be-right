<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>That Can't Be Right</title>
</head>
<body>
<main>

    <div id="intro">
        <h1>That Can't Be Right</h1>
        <p>The rule is simple... Wrong Answers Only!</p>  
        <button id="start-btn">Begin</button>
    </div>

    <div id="quiz" class="hidden">
        <h3><strong class="warning">Choose the wrong answer!</strong></h3>
        <h2 id="question"></h2>
        <div id="options"></div>
        <p id="feedback"></p>
        <button id="next-btn" class="hidden">Next</button>
    </div>

    <div id="results" class="hidden">
        <h2>You scored <span id="score"></span>...somehow</h2>
        <p id="comment"></p>
    </div>

</main>
<footer>
    <p>Copyright Tobi Olu 2026</p>
</footer>

</body>
</html>
